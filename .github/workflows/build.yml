name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: |
          pyinstaller draggy_encoder.spec

      - name: Update version in Inno Setup script
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME:-1.0.0}
          sed -i "s/#define MyAppVersion .*/#define MyAppVersion \"$VERSION\"/" installer.iss

      - name: Build Windows Installer
        uses: Local-Developer/Inno-Setup-Action@v1.2.2
        with:
          filepath: installer.iss

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DraggyEncoder-Windows-Installer
          path: installer_output/*.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: |
          pyinstaller draggy_encoder.spec

      - name: Build AppImage
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1
        run: |
          chmod +x build_appimage.sh
          VERSION=${GITHUB_REF_NAME:-rolling} ./build_appimage.sh $VERSION

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DraggyEncoder-Linux-AppImage
          path: "*.AppImage"

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/DraggyEncoder-Windows-Installer/*.exe
            artifacts/DraggyEncoder-Linux-AppImage/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
