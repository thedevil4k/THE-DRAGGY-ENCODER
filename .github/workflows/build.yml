name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Run Windows Build Script
        shell: pwsh
        run: |
          .\scripts\build_win.ps1

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DraggyEncoder-Windows-Installer
          path: DRAGGY_RELEASES/*.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm dpkg-dev wget libnotify-bin dbus-x11

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Run Linux Build Script
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1
        run: |
          chmod +x scripts/build_linux.sh
          chmod +x build_appimage.sh
          bash scripts/build_linux.sh

      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: DraggyEncoder-Linux-Packages
          path: |
            DRAGGY_RELEASES/*.AppImage
            DRAGGY_RELEASES/*.deb
            DRAGGY_RELEASES/*.rpm

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/DraggyEncoder-Windows-Installer/*.exe
            artifacts/DraggyEncoder-Linux-Packages/*.AppImage
            artifacts/DraggyEncoder-Linux-Packages/*.deb
            artifacts/DraggyEncoder-Linux-Packages/*.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
